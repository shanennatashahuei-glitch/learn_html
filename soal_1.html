<!DOCTYPE html>
<html>
    <head>
        <title>Tabel Persegi Shanen</title>
    </head>
<body>
   <table border = "1" width = "450px", height = "450px", align = "center">
    <tr align = "center">
        <td colspan = "4" style = "background-color: blue;">A</td>
        <td rowspan = "4" style = "background-color: yellow">D</td>
    </tr>

    <tr align = "center">
        <td rowspan = "4" style = "background-color: yellow;">G</td>
        <td colspan = "2" style = "background-color: red;">B</td>
        <td rowspan = "2" style = "background-color: greenyellow;">C</td>
    </tr>

    <tr align = "center">
        <td rowspan = "2" style = "background-color: greenyellow;">F</td>
        <td style = "background-color: black; color: white">X</td>
    </tr>

    <tr align = "center">
        <td colspan = "2" style = "background-color: red;">E</td>
    </tr>

    <tr align = "center">
        <td colspan = "4" style = "background-color: blue;">H</td>
    </tr>

   </table>
</body>
</html>
